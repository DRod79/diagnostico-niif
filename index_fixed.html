<style>

<script>
const $=document.getElementById('app');
const B={f:"#0F3A33",l:"#7CF67A",n:"#022E42",o:"#FF8A3D",c:"#F7EEDB"};

const COUNTRIES=["Argentina","Bahamas","Barbados","Belice","Bolivia","Brasil","Canadá","Chile","Colombia","Costa Rica","Cuba","Ecuador","El Salvador","Estados Unidos","Guatemala","Haití","Honduras","Jamaica","México","Nicaragua","Panamá","Paraguay","Perú","Puerto Rico","República Dominicana","Trinidad y Tobago","Uruguay","Venezuela","Otro país"];
const PC={"Argentina":"+54","Bahamas":"+1","Barbados":"+1","Belice":"+501","Bolivia":"+591","Brasil":"+55","Canadá":"+1","Chile":"+56","Colombia":"+57","Costa Rica":"+506","Cuba":"+53","Ecuador":"+593","El Salvador":"+503","Estados Unidos":"+1","Guatemala":"+502","Haití":"+509","Honduras":"+504","Jamaica":"+1","México":"+52","Nicaragua":"+505","Panamá":"+507","Paraguay":"+595","Perú":"+51","Puerto Rico":"+1","República Dominicana":"+1","Trinidad y Tobago":"+1","Uruguay":"+598","Venezuela":"+58","Otro país":"+"};

const QS=[
{id:"P1",text:"¿En qué sector opera tu organización?",dim:null,type:"s",hasOther:true,opts:[{t:"Servicios financieros (bancos, aseguradoras, cooperativas)",p:0},{t:"Manufactura y producción industrial",p:0},{t:"Energía y servicios públicos",p:0},{t:"Comercio y retail",p:0},{t:"Tecnología y telecomunicaciones",p:0},{t:"Construcción e inmobiliario",p:0},{t:"Agroindustria y alimentos",p:0},{t:"Turismo y hospitalidad",p:0},{t:"Transporte y logística",p:0},{t:"Otro",p:0}]},
{id:"P2",text:"¿Cuál es el tamaño de tu organización?",dim:null,type:"s",opts:[{t:"Micro (1-10 empleados)",p:0},{t:"Pequeña (11-50)",p:0},{t:"Mediana (51-200)",p:0},{t:"Grande (201-1000)",p:0},{t:"Corporativa (más de 1000)",p:0}]},
{id:"P3",text:"¿Tu organización está sujeta a requisitos regulatorios de reporte de sostenibilidad?",dim:"u",type:"s",opts:[{t:"Sí, con fecha límite en los próximos 12 meses",p:30},{t:"Sí, con fecha límite en 1-3 años",p:20},{t:"No directamente, pero clientes o inversionistas lo exigen",p:15},{t:"No, pero anticipamos que será requerido",p:10},{t:"No tenemos requisitos y no anticipamos que lleguen pronto",p:0},{t:"Desconozco la situación regulatoria de mi organización",p:5}]},
{id:"P4",text:"¿Alguna de estas partes interesadas ha solicitado información de sostenibilidad?",dim:"u",type:"m",minSel:1,opts:[{t:"Inversionistas institucionales o bancos",p:10},{t:"Clientes corporativos principales",p:8},{t:"Reguladores o bolsa de valores",p:12},{t:"Solo interés interno de directivos",p:4},{t:"Nadie ha solicitado aún",p:0}]},
{id:"P5",text:"¿Tu organización publica algún tipo de reporte de sostenibilidad?",dim:"m",type:"s",opts:[{t:"Reporte completo bajo estándares internacionales con auditoría externa",p:25},{t:"Reporte completo bajo estándares internacionales sin auditoría externa",p:20},{t:"Reporte de sostenibilidad con metodología propia",p:15},{t:"Reporte integrado con sección de sostenibilidad",p:12},{t:"Solo datos básicos en el informe anual",p:8},{t:"No publicamos nada de sostenibilidad",p:0}]},
{id:"P6",text:"¿Tienen identificados los riesgos y oportunidades relacionados con el clima?",dim:"m",type:"s",opts:[{t:"Sí, con evaluación cuantitativa de impacto financiero",p:25},{t:"Sí, identificados de forma cualitativa",p:18},{t:"Parcialmente, solo los riesgos principales",p:10},{t:"Hemos empezado a explorar el tema",p:5},{t:"No hemos abordado este tema",p:0}]},
{id:"P7",text:"¿Tienen un análisis de materialidad realizado?",dim:"m",type:"s",opts:[{t:"Doble materialidad (impacto y financiera)",p:20},{t:"Materialidad enfocada en impactos sociales y ambientales",p:15},{t:"Materialidad enfocada en riesgos financieros",p:12},{t:"Proceso informal de priorización de temas",p:5},{t:"No tenemos análisis de materialidad",p:0}]},
{id:"P8",text:"¿Miden las emisiones de gases de efecto invernadero de su organización?",dim:"m",type:"s",opts:[{t:"Sí, emisiones directas, indirectas y de cadena de valor",p:20},{t:"Sí, directas e indirectas de energía, cadena de valor parcial",p:15},{t:"Solo emisiones directas e indirectas de energía",p:10},{t:"Estimaciones básicas sin metodología formal",p:5},{t:"No medimos emisiones",p:0}]},
{id:"P9",text:"¿Han realizado análisis de escenarios climáticos para evaluar la resiliencia de su estrategia?",dim:"m",type:"s",opts:[{t:"Sí, con escenarios cuantitativos formales",p:10},{t:"Sí, análisis cualitativo con narrativas de escenarios",p:7},{t:"Hemos explorado el tema sin formalizar resultados",p:4},{t:"Conocemos el concepto pero no lo hemos aplicado",p:2},{t:"No hemos realizado este tipo de análisis",p:0}]},
{id:"P10",text:"¿Existe liderazgo ejecutivo comprometido con la agenda de sostenibilidad?",dim:"c",type:"s",opts:[{t:"Director o ejecutivo de alto nivel con mandato formal",p:15},{t:"Gerente senior con responsabilidad parcial",p:10},{t:"Equipo junior o consultor externo lidera el tema",p:6},{t:"Hay interés informal pero sin responsable designado",p:3},{t:"No hay liderazgo activo en sostenibilidad",p:0}]},
{id:"P11",text:"¿La junta directiva tiene supervisión formal de temas de sostenibilidad?",dim:"c",type:"s",opts:[{t:"Comité especializado con términos de referencia formales",p:15},{t:"Agenda regular de sostenibilidad en las sesiones de junta",p:10},{t:"Revisión anual o esporádica del tema",p:5},{t:"Hay interés pero sin mecanismo formal",p:2},{t:"La junta no se involucra en estos temas",p:0}]},
{id:"P12",text:"¿Tienen equipo dedicado a sostenibilidad?",dim:"c",type:"s",opts:[{t:"Equipo dedicado de 3 o más personas",p:15},{t:"1-2 personas dedicadas",p:10},{t:"Responsabilidades compartidas con otras funciones",p:6},{t:"Una persona con dedicación parcial",p:3},{t:"Nadie tiene responsabilidades formales de sostenibilidad",p:0}]},
{id:"P13",text:"¿Tienen presupuesto asignado para iniciativas de sostenibilidad?",dim:"c",type:"s",opts:[{t:"Presupuesto formal y recurrente",p:10},{t:"Presupuesto asignado para proyectos específicos",p:7},{t:"Se financia desde el presupuesto de otra área",p:4},{t:"Sin presupuesto actual pero con disposición de invertir",p:2},{t:"Sin presupuesto ni perspectiva de inversión",p:0}]},
{id:"P14",text:"¿Tienen sistemas para recolectar y gestionar datos de sostenibilidad?",dim:"c",type:"s",opts:[{t:"Plataforma integrada con los sistemas financieros",p:15},{t:"Software especializado de sostenibilidad",p:12},{t:"Hojas de cálculo estructuradas con proceso formal",p:8},{t:"Datos dispersos sin proceso estandarizado",p:3},{t:"No recolectamos datos de sostenibilidad",p:0}]},
{id:"P15",text:"¿Tienen controles internos sobre la información de sostenibilidad que generan?",dim:"c",type:"s",opts:[{t:"Controles formales alineados con marcos de control interno",p:10},{t:"Procedimientos de revisión y validación documentados",p:7},{t:"Revisión informal por parte de un responsable",p:4},{t:"Sin controles formales establecidos",p:1},{t:"No generamos información de sostenibilidad",p:0}]},
{id:"P16",text:"¿Cómo evalúas la calidad y disponibilidad de datos en tu cadena de valor?",dim:"c",type:"s",opts:[{t:"Datos de proveedores y clientes clave disponibles y verificados",p:10},{t:"Datos parciales de algunos eslabones de la cadena",p:7},{t:"Usamos estimaciones sectoriales o promedios de industria",p:4},{t:"Datos muy limitados sobre nuestra cadena de valor",p:2},{t:"No tenemos visibilidad sobre la cadena de valor",p:0}]},
{id:"P17",text:"¿Tu organización tiene experiencia implementando marcos o estándares de reporte de sostenibilidad?",dim:"c",type:"s",opts:[{t:"Hemos implementado múltiples marcos de forma completa",p:10},{t:"Hemos implementado un marco de forma completa",p:7},{t:"Tenemos una implementación parcial o en proceso",p:4},{t:"Conocemos los marcos pero no los hemos implementado",p:2},{t:"No tenemos experiencia con marcos de reporte",p:0}]},
{id:"P18",text:"¿Cuáles son los principales obstáculos que enfrenta tu organización para avanzar?",dim:"u",type:"m3",minSel:1,opts:[{t:"No sabemos por dónde empezar ni cómo priorizar",p:10},{t:"Falta de datos y sistemas de medición adecuados",p:7},{t:"Falta de presupuesto o recursos financieros",p:5},{t:"Falta de apoyo o priorización de la alta dirección",p:4},{t:"Escasez de talento con las competencias necesarias",p:6},{t:"Complejidad técnica de los requisitos",p:5},{t:"No vemos obstáculos significativos en este momento",p:2}]},
{id:"P19",text:"¿Qué tipo de apoyo sería más valioso para tu organización en este momento?",dim:null,type:"mAll",minSel:1,hasOtherText:true,opts:[{t:"Asesoría técnica especializada",p:0},{t:"Capacitación y formación del equipo interno",p:0},{t:"Herramientas digitales de diagnóstico y seguimiento",p:0},{t:"Plantillas y marcos de trabajo predefinidos",p:0},{t:"Acompañamiento integral de implementación",p:0},{t:"Diagnóstico detallado de brechas y hoja de ruta",p:0},{t:"No considero que necesitemos apoyo externo",p:0}]},
{id:"P20",text:"¿En qué horizonte de tiempo les gustaría estar preparados para cumplir con los nuevos requisitos?",dim:null,type:"s",opts:[{t:"En los próximos 6 meses",p:0},{t:"Entre 6 meses y 1 año",p:0},{t:"Entre 1 y 2 años",p:0},{t:"Más de 2 años",p:0},{t:"Aún no hemos definido un horizonte",p:0}]}
];

const ARCH=[
{u:"ALTA",m:"ALTA",code:"VM",name:"Vanguardia madura",desc:"Tu organización ha construido una base sólida en sostenibilidad y ahora enfrenta una ventana de tiempo definida. Esta combinación de experiencia y urgencia te coloca en una posición privilegiada: puedes avanzar con confianza porque ya tienes gran parte del camino recorrido.",rec:"El foco debería estar en identificar las brechas específicas entre lo que ya reportas y lo que exigen NIIF S1 y S2, especialmente en cuantificación de efectos financieros y preparación para el aseguramiento externo. Un análisis detallado de esas brechas puntuales te permitirá cerrar el proceso de forma eficiente."},
{u:"ALTA",m:"MEDIA",code:"EP",name:"Ejecución presionada",desc:"Tu organización tiene bases sobre las cuales construir, pero el tiempo disponible exige moverse con decisión. Ya cuentas con elementos valiosos que pueden acelerarse, lo importante es priorizar bien para no desperdiciar esfuerzos.",rec:"Te beneficiaría un análisis de brechas priorizado que distinga lo urgente de lo importante. Una hoja de ruta de 6 a 12 meses con hitos claros por pilar de divulgación te dará estructura sin perder agilidad. Enfócate primero en gobernanza y métricas, que son los pilares que más tiempo requieren."},
{u:"ALTA",m:"BAJA",code:"CI",name:"Crisis inminente",desc:"La regulación o las exigencias del mercado avanzan más rápido que la preparación de tu organización. Esto no es inusual: muchas empresas en la región se encuentran en esta situación. Lo importante es reconocerlo y actuar con un plan claro.",rec:"El primer paso es un diagnóstico detallado que identifique los requisitos más urgentes. Busca acompañamiento especializado para priorizar acciones de mayor impacto. No intentes abordar todo a la vez: enfócate en construir las bases de gobernanza y gestión de riesgos primero."},
{u:"MEDIA",m:"ALTA",code:"PP",name:"Planificación proactiva",desc:"Tu organización tiene una madurez notable y, aunque la presión regulatoria no es inmediata, has decidido prepararte con anticipación. Esta visión de largo plazo es una fortaleza estratégica que pocas organizaciones en la región tienen.",rec:"Aprovecha esta ventana para optimizar lo que ya tienes y convertirlo en ventaja competitiva. Posicionarte ante inversionistas y reguladores como organización preparada genera confianza y abre puertas. Enfócate en refinar la cuantificación financiera de tus riesgos y oportunidades."},
{u:"MEDIA",m:"MEDIA",code:"DB",name:"Desarrollo balanceado",desc:"Tu organización avanza de forma equilibrada: tiene bases construidas y un horizonte razonable para seguir desarrollándose. Este balance permite ser estratégico en la asignación de recursos sin la presión de la urgencia extrema.",rec:"Construye una hoja de ruta de 12 a 18 meses con hitos por pilar y revisiones trimestrales. Prioriza el fortalecimiento de tus sistemas de datos y controles internos, que son la infraestructura sobre la cual se construye todo lo demás."},
{u:"MEDIA",m:"BAJA",code:"EI",name:"Exploración inicial",desc:"Tu organización está en las primeras etapas de este camino. La buena noticia es que tienes tiempo para construir bien desde el inicio, una ventaja que no todas las organizaciones tienen.",rec:"Antes de invertir en implementación, invierte en entender qué exigen las normas y cómo aplican a tu sector. Un diagnóstico de brechas te dará una fotografía clara. La capacitación de tu equipo clave es fundamental para construir capacidades internas duraderas."},
{u:"BAJA",m:"ALTA",code:"OA",name:"Oportunista avanzado",desc:"Tu organización tiene madurez alta sin presión regulatoria directa. Esto te coloca en una posición única: puedes usar tu preparación como diferenciador competitivo real ante inversionistas y socios comerciales.",rec:"Considera la adopción voluntaria de NIIF S1 y S2 como declaración estratégica. Las empresas que se adelantan a la regulación construyen reputación, acceden a financiamiento preferencial y fortalecen relaciones clave. Enfócate en comunicar externamente lo que ya haces internamente."},
{u:"BAJA",m:"MEDIA",code:"GP",name:"Gestión preventiva",desc:"Tu organización tiene capacidades moderadas y un horizonte cómodo para seguir desarrollándose. Es un momento ideal para invertir en formación y construcción gradual de procesos.",rec:"Avanza con formación continua en los conceptos clave de NIIF S1 y S2, enfocándote en la diferencia entre reporte de impacto y divulgación financiera de sostenibilidad. Construir capacidades ahora permite responder con agilidad cuando la regulación se formalice."},
{u:"BAJA",m:"BAJA",code:"OB",name:"Observador básico",desc:"Tu organización no ha iniciado un camino formal en sostenibilidad y no enfrenta presión inmediata. Este es un punto de partida válido, y reconocerlo es el primer paso para planificar con claridad.",rec:"El paso más valioso ahora es entender por qué estos temas son relevantes para tu negocio específico. Un análisis de materialidad te ayudará a identificar qué riesgos y oportunidades podrían afectar tus resultados financieros. La sensibilización del equipo directivo es fundamental."}
];

const PILLARS=[{name:"Gobernanza",count:8},{name:"Estrategia",count:12},{name:"Gestión de riesgos",count:7},{name:"Métricas y objetivos",count:13}];

let S={v:"landing",st:0,ans:{},ld:{email:"",country:""},dp:{email:"",name:"",company:"",role:"",phone:"",customCountry:""},gate:false,sent:false,dec:false,oSec:"",oSup:""};

function gL(s){return s>=80?"ALTA":s>=50?"MEDIA":"BAJA"}
function cS(){let u=0,m=0,c=0;Object.entries(S.ans).forEach(([q,v])=>{const x=QS.find(z=>z.id===q);if(!x||!x.dim)return;if(Array.isArray(v))v.forEach(i=>{const p=x.opts[i]?.p||0;if(x.dim==="u")u+=p;if(x.dim==="m")m+=p;if(x.dim==="c")c+=p});else if(typeof v==="number"){const p=x.opts[v]?.p||0;if(x.dim==="u")u+=p;if(x.dim==="m")m+=p;if(x.dim==="c")c+=p}});return{u:Math.min(100,u),m:Math.min(100,m),c:Math.min(100,c)}}
function gA(s){return ARCH.find(a=>a.u===gL(s.u)&&a.m===gL(s.m))||ARCH[8]}
function eG(){const s=cS();const cap=s.c/100;const mat=s.m/100;const g=[];let t=0;PILLARS.forEach(p=>{for(let i=0;i<p.count;i++){const b=p.name==="Gobernanza"?(S.ans.P11!==undefined?QS[10].opts[S.ans.P11].p/15:.3):p.name==="Estrategia"?(S.ans.P6!==undefined?QS[5].opts[S.ans.P6].p/25:.3):p.name==="Gestión de riesgos"?Math.max(mat,.3):Math.max(mat,S.ans.P8!==undefined?QS[7].opts[S.ans.P8].p/20:.2);const n=Math.sin(t*7.3)*.15;const sc=Math.max(0,Math.min(1,b*(.5+cap*.5)+n));g.push(sc>=.7?3:sc>=.4?2:1);t++}});return g}
function vE(e){return/^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,6}$/.test(e)}

function R(noScroll){$.style.userSelect="none";$.style.webkitUserSelect="none";$.oncontextmenu=e=>e.preventDefault();
if(S.v==="landing")rL();else if(S.v==="capture")rC();else if(S.v==="quiz")rQ();else if(S.v==="results")rR();if(!noScroll)window.scrollTo({top:0,behavior:'smooth'})}

function rL(){
$.innerHTML=`
<div style="padding:3rem 1rem 2rem;text-align:center;background:linear-gradient(180deg,${B.c}55 0%,transparent 100%);border-radius:12px;">
  <div style="display:inline-block;background:${B.f};color:${B.l};border-radius:20px;padding:5px 16px;font-size:12px;font-weight:500;margin-bottom:1.5rem;letter-spacing:.03em;">Diagnóstico NIIF S1 y S2 · Acceso gratuito</div>
  <h1 style="font-family:var(--serif);font-size:clamp(24px,5vw,30px);font-weight:500;line-height:1.3;margin:0 0 .5rem;color:${B.f};">Las reglas del juego cambiaron</h1>
  <p style="font-family:var(--serif);font-size:clamp(18px,3.5vw,22px);color:${B.n};opacity:.65;margin:0 0 1.5rem;line-height:1.4;">¿Ya sabes dónde se encuentra tu empresa?</p>
  <p style="font-size:15px;color:#555;line-height:1.7;margin:0 0 .75rem;max-width:520px;margin-left:auto;margin-right:auto;">Las normas NIIF S1 y S2 están transformando la forma en que las empresas de América Latina reportan sostenibilidad. La S1 establece los requisitos generales de divulgación. La S2 aborda específicamente los riesgos y oportunidades climáticos.</p>
  <p style="font-size:15px;color:${B.f};line-height:1.7;margin:0 0 2rem;max-width:520px;margin-left:auto;margin-right:auto;font-weight:500;">Este diagnóstico te muestra en 10 minutos qué tan preparada está tu organización, dónde están tus brechas, y por dónde empezar.</p>
  <button onclick="S.v='capture';R()" style="background:${B.f};color:${B.c};border:none;border-radius:8px;padding:14px 32px;font-size:15px;font-weight:500;">Quiero conocer mi diagnóstico</button>
</div>
<div style="border-top:2px solid ${B.l}44;padding:2rem 0 0;margin:1.5rem 0;">
  <p style="font-size:12px;font-weight:500;color:${B.f};text-transform:uppercase;letter-spacing:.06em;margin:0 0 1rem;">Lo que vas a obtener</p>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;">
    ${[{t:"Tu perfil en 1 de 9 arquetipos",d:"No es un puntaje genérico. Es un perfil que describe tu punto de partida exacto y te indica cuál es el siguiente paso más inteligente para tu organización."},{t:"Tres dimensiones que importan",d:"Urgencia regulatoria, madurez operativa y capacidad institucional. Cada una evaluada de 0 a 100 con una interpretación clara de tu resultado."},{t:"Mapa visual de tus brechas",d:"Una visualización clara por cada pilar de divulgación que exigen NIIF S1 y S2: gobernanza, estrategia, gestión de riesgos, métricas y objetivos."},{t:"Una recomendación que puedes usar mañana",d:"Una dirección concreta basada en tu sector, tu país y tu nivel actual. Algo que puedes llevar a tu próxima reunión de equipo."}].map(i=>`<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1.25rem;border-left:3px solid ${B.l};"><p style="font-size:14px;font-weight:500;color:${B.f};margin:0 0 6px;">${i.t}</p><p style="font-size:13px;color:#6B7280;margin:0;line-height:1.6;">${i.d}</p></div>`).join("")}
  </div>
</div>
<div style="background:${B.c}66;border-radius:12px;padding:1.5rem;border:1px solid ${B.c};">
  <p style="font-size:14px;font-weight:500;color:${B.f};margin:0 0 8px;">¿Para quién es este diagnóstico?</p>
  <p style="font-size:14px;color:#555;margin:0;line-height:1.7;">Para cualquier profesional de sostenibilidad, finanzas, riesgos, auditoría o consultoría en América que necesite entender dónde se encuentra su organización frente a los nuevos requisitos de NIIF S1 y S2. Es completamente confidencial, gratuito y toma menos de 10 minutos.</p>
</div>`}

function rC(){
$.innerHTML=`
<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1.5rem;max-width:460px;margin:2rem auto;">
  <p style="font-size:12px;font-weight:500;color:${B.f};margin:0 0 4px;">Paso 1 de 2</p>
  <h2 style="font-size:20px;font-weight:500;margin:0 0 4px;">Antes de empezar</h2>
  <p style="font-size:14px;color:#6B7280;margin:0 0 1.25rem;">Solo necesitamos dos datos para personalizar tu experiencia.</p>
  <label style="display:block;margin-bottom:4px;"><span style="font-size:12px;font-weight:500;display:block;margin-bottom:4px;">Correo electrónico profesional</span><input id="fe" type="email" placeholder="nombre@empresa.com" value="${S.ld.email}"></label>
